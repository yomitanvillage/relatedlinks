<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple-dark:   #3b1f6e;
    --purple-mid:    #5a3295;
    --purple-light:  #7b52b8;
    --purple-pale:   #ede8f8;
    --purple-accent: #c9a8ff;
    --accent:        #f0a500;
    --bg:            #f5f2f9;
    --surface:       #ffffff;
    --text:          #1e1e1e;
    --text-muted:    #6b6b6b;
    --border:        rgba(90,50,149,0.12);
    --radius:        16px;
    --radius-sm:     10px;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ─── Header ─── */
  .header {
    background: linear-gradient(160deg, var(--purple-dark) 0%, var(--purple-mid) 100%);
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(59,31,110,0.25);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .header-title h1 {
    font-size: 19px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  .header-title p {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .count-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.9);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 11px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    white-space: nowrap;
    font-family: 'Noto Sans JP', sans-serif;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    position: relative;
  }

  .tab:hover { color: rgba(255,255,255,0.8); }

  .tab.active {
    color: #fff;
    border-bottom-color: var(--accent);
    background: rgba(255,255,255,0.07);
  }

  /* ─── Content ─── */
  .content { padding: 16px; }

  /* ─── Genre header ─── */
  .genre-group { margin-bottom: 20px; }

  .genre-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .genre-pill {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 11px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  .pill-hp   { background: var(--purple-mid); color: #fff; }
  .pill-ig   { background: #e8590c; color: #fff; }
  .pill-yt   { background: #cc0000; color: #fff; }
  .pill-line { background: #06c755; color: #fff; }
  .pill-note { background: #3d3d3d; color: #fff; }
  .pill-fb   { background: #1877f2; color: #fff; }

  /* ─── Link cards ─── */
  .link-list { display: flex; flex-direction: column; gap: 7px; }

  .link-item {
    background: var(--surface);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    transition: transform 0.13s, box-shadow 0.13s;
    -webkit-tap-highlight-color: transparent;
  }

  .link-item:active {
    transform: scale(0.975);
  }

  .link-body {
    flex: 1;
    padding: 12px 14px;
    min-width: 0;
  }

  .link-name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--text);
  }

  .link-url {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-arrow {
    padding-right: 12px;
    color: #ccc;
    font-size: 16px;
    flex-shrink: 0;
  }

  .genre-group.hidden { display: none; }

  .footer-space { height: 32px; }
</style>

function getDomain(url) {
  try { return new URL(url).hostname.replace("www.", ""); } catch { return url; }
}

function renderAll() {
  const genres = ["HP","Instagram","Youtube","LINE","note","Facebook"];
  let html = "";
  for (const genre of genres) {
    const items = links.filter(l => l.genre === genre);
    const cfg = genreConfig[genre];
    html += `<div class="genre-group" data-genre="${genre}">`;
    html += `<div class="genre-header">
      <span class="genre-pill ${cfg.pillClass}">${cfg.label}</span>
      <span style="font-size:11px;color:var(--text-muted)">${items.length}件</span>
    </div>`;
    html += `<div class="link-list">`;
    for (const link of items) {
      html += `<a class="link-item ${cfg.tagClass}" href="${link.url}" target="_blank" rel="noopener" data-genre="${link.genre}">
        <div class="link-body">
          <div class="link-name">${link.name}</div>
          <div class="link-url">${getDomain(link.url)}</div>
        </div>
        <div class="link-arrow">›</div>
      </a>`;
    }
    html += `</div></div>`;
  }
  document.getElementById("mainContent").innerHTML = html;
}

function filterByGenre(genre) {
  document.querySelectorAll(".genre-group").forEach(g => {
    g.classList.toggle("hidden", genre !== "all" && g.dataset.genre !== genre);
  });
  const total = genre === "all" ? links.length : links.filter(l => l.genre === genre).length;
  document.getElementById("countBadge").textContent = total + "件";
}

/* ── Init ── */

renderAll();

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => {
      t.classList.remove("active");
      t.setAttribute("aria-selected","false");
    });
    tab.classList.add("active");
    tab.setAttribute("aria-selected","true");
    filterByGenre(tab.dataset.genre);
  });
});
</script>
